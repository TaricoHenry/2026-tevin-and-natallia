{% if include.var == "right" %}
    <div class="text-image text-image-right fadein right">
{% else %}
    <div class="text-image fadein left">
{% endif %}
        <div class="story-photo">
            <img class="photo drop-shadow" src="{{ include.img | relative_url}}" alt="">
            <img class="photo-decor" src="{{ include.img-bkgd | relative_url}}" style="rotate: {{ include.angle }}deg; left: {{ include.left-percent }}%" alt="">
        </div>
        <p>{{ include.text }}</p>
    </div>
